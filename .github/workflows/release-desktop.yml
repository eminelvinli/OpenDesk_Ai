# ─────────────────────────────────────────────────────────────────────────────
# OpenDesk AI — Desktop Client Release Pipeline
#
# Builds professional installers for Windows (.exe NSIS + .msi),
# macOS (.dmg), and Linux (.AppImage + .deb).
#
# Uses manual `cargo tauri build` instead of tauri-action to avoid
# the auto-target-detection bug that passes duplicate --target flags.
#
# Trigger: git tag v0.1.0 && git push --tags
# ─────────────────────────────────────────────────────────────────────────────

name: Build Desktop Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  GATEWAY_WS_URL: ${{ secrets.GATEWAY_WS_URL }}

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows x64
            target: ''
          - platform: macos-latest
            label: macOS ARM64
            target: 'aarch64-apple-darwin'
          - platform: ubuntu-22.04
            label: Linux x64
            target: ''

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './desktop_client/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './desktop_client/src-tauri -> target'

      # ── Linux system dependencies ───────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ── Install frontend deps ──────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: desktop_client
        run: npm install

      # ── Install Tauri CLI via Cargo ────────────────────────────────────
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # ── Build Tauri application (manual — full control over --target) ──
      - name: Build Tauri application
        working-directory: desktop_client
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo tauri build --target ${{ matrix.target }}
          else
            cargo tauri build
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      # ── Collect build artifacts ────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: |
            desktop_client/src-tauri/target/**/release/bundle/**/*.exe
            desktop_client/src-tauri/target/**/release/bundle/**/*.msi
            desktop_client/src-tauri/target/**/release/bundle/**/*.dmg
            desktop_client/src-tauri/target/**/release/bundle/**/*.AppImage
            desktop_client/src-tauri/target/**/release/bundle/**/*.deb
          if-no-files-found: warn

  # ── Create GitHub Release from all artifacts ─────────────────────────────
  create-release:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: 'OpenDesk AI ${{ github.ref_name }}'
          body: |
            ## OpenDesk AI ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `.exe` (NSIS) or `.msi` |
            | macOS    | `.dmg` (drag to Applications) |
            | Linux    | `.AppImage` or `.deb` |

            ### First-time setup
            1. Install and launch OpenDesk AI
            2. Note the 6-digit pairing code
            3. Enter it at https://app.opendesk.ai/pair
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
