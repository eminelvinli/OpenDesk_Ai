<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenDesk AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: white;
      margin-bottom: 16px;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.3);
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }

    h1 span {
      color: #60a5fa;
    }

    .subtitle {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 32px;
    }

    .pairing-section {
      text-align: center;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px 40px;
      backdrop-filter: blur(12px);
    }

    .pairing-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    .pairing-code {
      font-size: 40px;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 8px;
      color: white;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }

    .pairing-hint {
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.waiting {
      background: #f59e0b;
    }

    .status-dot.paired {
      background: #22c55e;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .device-id {
      margin-top: 20px;
      font-size: 10px;
      color: #475569;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <div class="logo">O</div>
  <h1>OpenDesk <span>AI</span></h1>
  <p class="subtitle">Desktop Client</p>

  <div class="pairing-section">
    <div class="pairing-label">Pairing Code</div>
    <div class="pairing-code" id="pairingCode">------</div>
    <div class="pairing-hint">
      Enter this code in your OpenDesk AI dashboard<br />
      to pair this device with your account.
    </div>
  </div>

  <div class="status">
    <div class="status-dot waiting" id="statusDot"></div>
    <span id="statusText">Waiting for pairing...</span>
  </div>

  <div class="device-id" id="deviceId"></div>

  <script>
    // Generate a random 6-digit pairing code.
    function generatePairingCode() {
      return Math.floor(100000 + Math.random() * 900000).toString();
    }

    const code = generatePairingCode();
    document.getElementById('pairingCode').textContent = code;
    document.getElementById('deviceId').textContent = 'Device: dev-rust-001';

    // Store the pairing code for the Rust backend to read.
    window.__OPENDESK_PAIRING_CODE__ = code;

    // Listen for pairing success from the Rust backend via Tauri events.
    if (window.__TAURI__) {
      window.__TAURI__.event.listen('pairing-success', (event) => {
        document.getElementById('statusDot').className = 'status-dot paired';
        document.getElementById('statusText').textContent = 'Paired with ' + event.payload.userId;
        document.getElementById('pairingCode').style.opacity = '0.3';
      });
    }
  </script>
</body>

</html>
